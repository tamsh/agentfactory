apiVersion: v1
kind: WorkflowTemplate
metadata:
  name: acceptance-coordination
  description: Coordinate acceptance across sub-issues for parent issues
  workType: acceptance-coordination

tools:
  allow:
    - shell: "gh pr *"
    - shell: "git push origin --delete *"
    - shell: "pnpm af-issue *"
  disallow:
    - user-input

prompt: |
  Coordinate acceptance across sub-issues for parent issue {{identifier}}.

  WORKFLOW:
  1. Verify all sub-issues are in Delivered status: {{linearCli}} list-sub-issue-statuses {{identifier}}
  2. If any sub-issue is NOT Delivered, report which sub-issues need attention and fail
  3. Validate the PR:
     - CI checks are passing
     - No merge conflicts
     - Preview deployment succeeded (if applicable)
  4. Merge the PR: gh pr merge <PR_NUMBER> --squash
  5. After merge succeeds, delete the remote branch: git push origin --delete <BRANCH_NAME>
  6. Bulk-update all sub-issues to Accepted: for each sub-issue, run {{linearCli}} update-sub-issue <id> --state Accepted
  7. Mark parent as complete (transitions to Accepted)

  IMPORTANT CONSTRAINTS:
  - This is a GATE — validate and merge or reject. Do NOT make code changes, git commits, or fix issues yourself.
  - If the PR has problems, report them and emit WORK_RESULT:failed. Do NOT attempt to fix them.
  - ALL sub-issues must be in Delivered status before proceeding
  - The PR must pass CI and have no conflicts
  - If merge fails, report the error and do not mark as Accepted
  - NEVER run {{linearCli}} update-issue --state. The orchestrator manages ALL parent issue status transitions based on your WORK_RESULT marker. Manually changing status causes infinite loops.
  - Only use {{linearCli}} for: list-sub-issue-statuses, list-sub-issues, update-sub-issue, create-comment, check-deployment
  {{> partials/repo-validation}}
  {{> partials/large-file-instructions}}{{> partials/cli-instructions}}
  {{#if mentionContext}}

  Additional context from the user's mention:
  {{mentionContext}}
  {{/if}}
  {{> partials/work-result-marker}}
